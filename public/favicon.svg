<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" fill="none">
  <defs>
    <!-- Premium dark gradient for shield background -->
    <linearGradient id="shield-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1329" />
      <stop offset="100%" stop-color="#022c22" />
    </linearGradient>
    
    <!-- Neon green gradient for shield border -->
    <linearGradient id="neon-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
  </defs>

  <!-- The Shield Shape with Neon Glow Border -->
  <path d="M16 2.5 L27 6.5 V15 C27 21.5 22.5 26.5 16 29.5 C9.5 26.5 5 21.5 5 15 V6.5 Z" fill="url(#shield-bg)" stroke="url(#neon-grad)" stroke-width="2" stroke-linejoin="round" />

  <!-- Abstract Dynamic Slash (Sports speed lines behind the T) -->
  <path d="M8 22 L24 8" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" opacity="0.3" />

  <!-- Bold white letter 'T' (Monogram representing TurfTitans / Wickets) -->
  <!-- Top bar of the T -->
  <rect x="9" y="8" width="14" height="3.2" rx="1" fill="#ffffff" />
  <!-- Stem of the T -->
  <rect x="14.5" y="11.2" width="3" height="9.8" rx="1" fill="#ffffff" />

  <!-- Premium Red Cricket Ball nestled next to the stem -->
  <circle cx="21" cy="19.5" r="3.2" fill="#ef4444" stroke="#7f1d1d" stroke-width="0.5" />
  
  <!-- Mini white seam highlight on the cricket ball -->
  <path d="M19.5 18 A 3.2 3.2 0 0 0 22.5 21" stroke="#ffffff" stroke-width="0.6" fill="none" stroke-linecap="round" opacity="0.8" />
</svg>
